# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - brigade-tramp

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: dotnet publish
        run: dotnet publish -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_67FD4918ABA34D4381D670086A7D5DB7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_69F53C3695CB449580E8D33AD9685A2F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E4510F39FEBE49D88B86A3B4D068097E }}

      - name: Configure App Settings
        uses: azure/appservice-settings@v1
        with:
          app-name: 'brigade-tramp'
          app-settings-json: |
            [
              {
                "name": "AdminPassword",
                "value": "${{ secrets.ADMINPASSWORD }}",
                "slotSetting": false
              }
            ]
          connection-strings-json: |
            [
              {
                "name": "Default",
                "value": "${{ vars.CONNECTIONSTRINGS__DEFAULT }}",
                "type": "SQLAzure",
                "slotSetting": false
              }
            ]

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'brigade-tramp'
          slot-name: 'Production'
          package: .
          